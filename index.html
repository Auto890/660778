<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: white;
    }
    .container {
      display: flex;
    }
    .left {
      width: 30%;
      text-align: center;
      padding: 20px;
      background: #161b22;
    }
    .left img {
      width: 150px;
      border-radius: 50%;
    }
    .right {
      width: 70%;
      padding: 20px;
    }
    .badge {
      display: inline-block;
      padding: 8px 12px;
      margin: 5px;
      border-radius: 5px;
      font-weight: bold;
    }
    .git { background: #f1502f; }
    .unity { background: #000; }
    .xampp { background: #fb7a24; }
  </style>
</head>
<body>

<div class="container">
  <div class="left">
    <img src="your-image.jpg">
    <h2>Your Name</h2>
    <p>Data Analyst</p>
  </div>

  <div class="right">
    <h2>About Me</h2>
    <p>
      I am interested in pursuing a career as a Data Analyst. 
      I enjoy working with data, building dashboards, and supporting business decisions.
    </p>

    <h2>Tools & Technologies</h2>
    <span class="badge git">GIT</span>
    <span class="badge unity">UNITY</span>
    <span class="badge xampp">XAMPP</span>
  </div>
</div>

</body>
</html>
